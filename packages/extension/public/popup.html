<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
    <title>YouTube Discord Presence</title>
  </head>
  <body>
    <main>
      <header>
        <div>
          <p class="eyebrow">YouTube</p>
          <h1>Discord Presence</h1>
        </div>
        <label class="switch" title="Track YouTube activity">
          <input id="tracking-toggle" type="checkbox" checked>
          <span></span>
        </label>
      </header>
      <section class="panel">
        <div class="row">
          <span id="status-dot" class="status-dot status-dot--warn"></span>
          <p id="status">Checking native host...</p>
        </div>
        <p id="active" class="active">Checking playback...</p>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
